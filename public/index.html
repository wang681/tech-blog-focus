<!doctype html>
<html lang="en">
  <head>

    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f5f7fb; color: #0f172a; }

      h1 { margin: 0 0 10px; font-size: 32px; }
      p { margin: 0; font-size: 18px; color: #334155; line-height: 1.6; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>Tech Blog Focus</h1>
        <p>For content sites with long-form posts, tags, and archive pages.</p>
      </section>
    </main>
  </body>
</html>
